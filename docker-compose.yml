services:
  postgres:
    image: postgres:15-alpine
    container_name: peru-accessibility-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: peru-accessibility-redis
    restart: always
    # appendonly: los jobs de BullMQ sobreviven a un reinicio de Redis.
    # appendfsync everysec: escribe al disco cada segundo — balance entre
    # durabilidad y rendimiento (vs 'always' que es más seguro pero más lento).
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: peru-accessibility-minio
    restart: always
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: peru-accessibility-api
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      QUEUE_MAX_PENDING: ${QUEUE_MAX_PENDING:-50}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: peru-accessibility-worker
    restart: always
    # Chrome necesita /dev/shm generoso; el default de Docker (64 MB) lo hace crashear.
    shm_size: '1gb'
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
    environment:
      NODE_ENV: ${NODE_ENV}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Cuántos scans corren en paralelo. Con 2GB RAM el máximo seguro es 3.
      # Aumentar si hay más RAM disponible (cada scan usa ~600MB peak).
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      QUEUE_MAX_PENDING: ${QUEUE_MAX_PENDING:-50}
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: peru-accessibility-frontend
    restart: always
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
