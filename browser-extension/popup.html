<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin Barreras</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="extension-shell">
      <header class="extension-header">
        <span class="extension-logo" aria-hidden="true">SB</span>
        <div>
          <p>Auditoria autenticada</p>
          <h1>Sin Barreras</h1>
        </div>
      </header>

      <form id="settings-form" class="extension-form">

        <label>
          <span>Token de acceso</span>
          <input id="api-token" type="password" autocomplete="off" placeholder="Bearer token o API token" required />
        </label>
        <label>
          <span>ID del escaneo</span>
          <input id="scan-id" type="text" autocomplete="off" placeholder="UUID del escaneo manual" required />
        </label>
      </form>


      <button id="run-audit" type="button" class="extension-primary">
        Escanear estado actual
      </button>

      <button id="send-results" type="button" class="extension-secondary" disabled>
        Enviar resultados al sistema
      </button>

      <p id="status" class="extension-status" role="status">Escanea la página; puedes abrir menús o modales y volver a escanear para cubrir más estados. Al final, envía todo junto.</p>
      <p class="extension-footer"><a href="https://sinbarreras.gzakgroup.com/privacy.html" target="_blank" rel="noopener">Politica de privacidad</a></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
